<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5CC6A"/>
      <stop offset="50%" stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#C49A35"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <rect x="8" y="8" width="176" height="176" rx="28" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <!-- Film reel circles -->
  <circle cx="64" cy="64" r="18" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.15"/>
  <circle cx="128" cy="64" r="18" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.15"/>
  <circle cx="64" cy="128" r="18" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.15"/>
  <circle cx="128" cy="128" r="18" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.15"/>
  <!-- TC letters -->
  <text x="96" y="108" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="64" fill="url(#gold)">TC</text>
  <!-- Subtle film strip top -->
  <rect x="20" y="18" width="152" height="6" rx="3" fill="url(#gold)" opacity="0.12"/>
  <!-- Subtle film strip bottom -->
  <rect x="20" y="168" width="152" height="6" rx="3" fill="url(#gold)" opacity="0.12"/>
</svg>