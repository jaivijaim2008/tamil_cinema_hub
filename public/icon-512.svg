<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5CC6A"/>
      <stop offset="50%" stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#C49A35"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="68" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <!-- Film reel circles -->
  <circle cx="170" cy="170" r="48" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.15"/>
  <circle cx="342" cy="170" r="48" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.15"/>
  <circle cx="170" cy="342" r="48" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.15"/>
  <circle cx="342" cy="342" r="48" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.15"/>
  <!-- TC letters -->
  <text x="256" y="290" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="170" fill="url(#gold)">TC</text>
  <!-- Subtle film strip top -->
  <rect x="52" y="48" width="408" height="14" rx="7" fill="url(#gold)" opacity="0.12"/>
  <!-- Subtle film strip bottom -->
  <rect x="52" y="450" width="408" height="14" rx="7" fill="url(#gold)" opacity="0.12"/>
</svg>