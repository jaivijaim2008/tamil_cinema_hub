<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9370DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A0DAD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Decorative gradient circles -->
  <circle cx="280" cy="80" r="35" fill="url(#orangeGrad)" filter="url(#glow)"/>
  <circle cx="320" cy="180" r="28" fill="url(#pinkGrad)" filter="url(#glow)"/>
  <circle cx="290" cy="310" r="32" fill="url(#blueGrad)" filter="url(#glow)"/>
  <circle cx="110" cy="320" r="30" fill="url(#purpleGrad)" filter="url(#glow)"/>
  <circle cx="70" cy="180" r="26" fill="url(#pinkGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="70" r="22" fill="url(#blueGrad)" filter="url(#glow)"/>
  
  <!-- Gradient ring around center -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#centerGrad)" stroke-width="3" opacity="0.6"/>
  
  <!-- Main black center circle -->
  <circle cx="200" cy="200" r="110" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
  
  <!-- Play button icon -->
  <path d="M 180 170 L 180 230 L 240 200 Z" fill="white"/>
</svg>