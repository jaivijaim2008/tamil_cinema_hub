name: Auto-Fetch Movies

on:
  schedule:
    # Runs every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI
    inputs:
      years:
        description: 'Specific years to fetch (e.g. 2025,2026). Leave empty for auto.'
        required: false
        default: ''
      phases:
        description: 'Which phases to run (1=import, 2=TMDB patch, 3=Wiki patch). Default: all.'
        required: false
        default: '1,2,3'

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}" >> .env.local
          echo "SANITY_WRITE_TOKEN=${{ secrets.SANITY_WRITE_TOKEN }}" >> .env.local
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> .env.local

      - name: Run full import + patch pipeline
        run: node scripts/gh-action-runner.js
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Check for remaining gaps
        run: |
          echo "✅ Pipeline complete!"
          echo "Check Sanity dashboard for remaining gaps."
