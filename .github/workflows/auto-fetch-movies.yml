name: Auto-Fetch Movies

on:
  schedule:
    # Runs every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI
    inputs:
      years:
        description: 'Specific years to fetch (e.g. 2025,2026). Leave empty for auto.'
        required: false
        default: ''
      phases:
        description: 'Which phases to run (1=import, 2=TMDB patch, 3=Wiki patch). Default: all.'
        required: false
        default: '1,2,3'

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}" >> .env.local
          echo "SANITY_WRITE_TOKEN=${{ secrets.SANITY_WRITE_TOKEN }}" >> .env.local
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> .env.local

      - name: Run import — only creates complete movies
        run: node scripts/gh-action-runner.js --only=1
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Verify all movies are complete
        run: |
          node -e "
            require('dotenv').config({path:'.env.local'});
            const {createClient}=require('@sanity/client');
            const c=createClient({projectId:process.env.NEXT_PUBLIC_SANITY_PROJECT_ID,dataset:process.env.NEXT_PUBLIC_SANITY_DATASET||'production',apiVersion:'2024-01-01',token:process.env.SANITY_WRITE_TOKEN,useCdn:false});
            c.fetch('count(*[_type==\"movie\"])').then(t=>console.log('Total movies:',t))
            .then(()=>c.fetch('count(*[_type==\"movie\" && (!defined(posterUrl)||posterUrl==\"\")])')).then(c=>console.log('Missing poster:',c))
            .then(()=>c.fetch('count(*[_type==\"movie\" && (!defined(synopsis)||synopsis==\"\")])')).then(c=>console.log('Missing synopsis:',c))
            .then(()=>c.fetch('count(*[_type==\"movie\" && (!defined(rating)||rating==0)])')).then(c=>console.log('Missing rating:',c))
            .then(()=>c.fetch('count(*[_type==\"movie\" && (!defined(ottPlatform)||ottPlatform==\"\")])')).then(c=>console.log('Missing OTT:',c))
            .then(()=>c.fetch('count(*[_type==\"movie\" && (!defined(cast)||cast==[])])')).then(c=>console.log('Missing cast:',c))
            .then(()=>c.fetch('count(*[_type==\"movie\" && (!defined(director)||director==\"\")])')).then(c=>console.log('Missing director:',c))
            .then(()=>c.fetch('count(*[_type==\"movie\" && (!defined(genre)||genre==[])])')).then(c=>console.log('Missing genre:',c));
          "
