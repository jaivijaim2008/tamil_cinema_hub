name: Keep ML Server Alive

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ML server health endpoint
        run: |
          echo "Pinging Render ML server to keep it alive..."
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://tamilcinema-recommender.onrender.com/health || echo "000")
          echo "Health check response: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Server is alive and responding"
          else
            echo "⚠️ Server returned status $response (may be waking up from cold start)"
          fi
